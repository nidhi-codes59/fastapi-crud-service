name: Task Management CI Pipeline
on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test: 
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -name "main.py"

      - name: Run Unit Tests
        run: |
          pytest

      - name: Verify FastAPI Application Starts
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 || true

